<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 | 光影记</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #888;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #222;
            --danger: #e74c3c;
            --font-cn: 'Noto Serif SC', serif;
            --font-en: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-cn);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 标签页导航 */
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 登录页 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-family: var(--font-en);
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-box p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-edit {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        /* 管理后台 */
        .admin-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h1 {
            font-family: var(--font-en);
            font-size: 1.5rem;
            font-weight: 300;
        }

        .admin-header .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-logout:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* 表格 */
        .photos-table, .articles-table {
            width: 100%;
            border-collapse: collapse;
        }

        .photos-table th,
        .photos-table td,
        .articles-table th,
        .articles-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .photos-table th,
        .articles-table th {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .photos-table img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .photos-table .actions,
        .articles-table .actions {
            display: flex;
            gap: 0.5rem;
        }

        .category-tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: var(--bg-secondary);
            border-radius: 3px;
            font-size: 0.75rem;
            color: var(--accent);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-family: var(--font-en);
            font-size: 1.3rem;
            font-weight: 400;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-footer .btn {
            flex: 1;
        }

        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>光影记</h1>
            <p>管理后台</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                <p class="error" id="loginError"></p>
            </form>
        </div>
    </div>

    <!-- 管理后台 -->
    <div class="admin-container" id="adminPage">
        <div class="admin-header">
            <h1>内容管理</h1>
            <div class="actions">
                <button class="btn btn-logout" onclick="logout()">退出</button>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('photos')">作品管理</button>
            <button class="tab-btn" onclick="switchTab('articles')">文章管理</button>
        </div>

        <!-- 作品管理 -->
        <div class="tab-content active" id="tab-photos">
            <div class="admin-header">
                <h2>作品列表</h2>
                <button class="btn btn-primary" onclick="openPhotoModal()">+ 添加作品</button>
            </div>
            <table class="photos-table">
                <thead>
                    <tr>
                        <th>封面</th>
                        <th>标题</th>
                        <th>分类</th>
                        <th>浏览</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="photosTable">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 文章管理 -->
        <div class="tab-content" id="tab-articles">
            <div class="admin-header">
                <h2>文章列表</h2>
                <button class="btn btn-primary" onclick="openArticleModal()">+ 添加文章</button>
            </div>
            <table class="articles-table">
                <thead>
                    <tr>
                        <th>标题</th>
                        <th>分类</th>
                        <th>浏览</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="articlesTable">
                    <tr><td colspan="4" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 作品模态框 -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="photoModalTitle">添加作品</h2>
                <button class="modal-close" onclick="closePhotoModal()">&times;</button>
            </div>
            <form id="photoForm">
                <input type="hidden" id="photoId">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="photoTitle" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="photoDesc">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="photoCategory">
                            <option value="landscape">风景</option>
                            <option value="portrait">人像</option>
                            <option value="street">街拍</option>
                            <option value="detail">细节</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>拍摄地点</label>
                        <input type="text" id="photoLocation" placeholder="如：日本·北海道">
                    </div>
                </div>
                <div class="form-group">
                    <label>图片 URL *</label>
                    <input type="url" id="photoSrc" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>缩略图 URL</label>
                    <input type="url" id="photoThumb" placeholder="留空使用原图">
                </div>
                <div class="form-group">
                    <label>摄影参数 (JSON)</label>
                    <input type="text" id="photoExif" placeholder='{"camera": "Sony A7R IV", "lens": "24-70mm", "aperture": "f/2.8"}'>
                </div>
                <div class="form-group">
                    <label>摄影心得</label>
                    <textarea id="photoThoughts" placeholder="分享这张照片的拍摄故事和心得..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closePhotoModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 文章模态框 -->
    <div class="modal" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="articleModalTitle">添加文章</h2>
                <button class="modal-close" onclick="closeArticleModal()">&times;</button>
            </div>
            <form id="articleForm">
                <input type="hidden" id="articleId">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="articleTitle" required>
                </div>
                <div class="form-group">
                    <label>摘要</label>
                    <input type="text" id="articleExcerpt" placeholder="文章简介...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="articleCategory">
                            <option value="tutorial">教程</option>
                            <option value="thoughts">随笔</option>
                            <option value="gear">器材</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>封面图 URL</label>
                        <input type="url" id="articleCover" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label>内容 (支持 Markdown) *</label>
                    <textarea id="articleContent" required style="min-height: 200px;" placeholder="使用 # 标题，## 二级标题..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeArticleModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sybgiwnksanuddwjeqkv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5Ymdpd25rc2FudWRkd2plcWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjczNjIsImV4cCI6MjA4OTU0MzM2Mn0.XOKk8sQxXknUlRKJtzp0wDPNjDDpkiz1YpoMdC6F6yE';
        
        const ADMIN_PASSWORD = 'admin_password';

        function checkAuth() {
            const loggedIn = localStorage.getItem('admin_logged_in') === 'true';
            if (loggedIn) {
                showAdmin();
                loadPhotos();
                loadArticles();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                showAdmin();
                loadPhotos();
                loadArticles();
            } else {
                document.getElementById('loginError').textContent = '密码错误';
            }
        });

        function logout() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
        }

        function showAdmin() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // ===== 作品管理 =====
        async function loadPhotos() {
            const tbody = document.getElementById('photosTable');
            tbody.innerHTML = '<tr><td colspan="5" class="loading">加载中...</td></tr>';
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                const photos = await res.json();
                renderPhotos(photos);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" class="error">加载失败</td></tr>`;
            }
        }

        function renderPhotos(photos) {
            const tbody = document.getElementById('photosTable');
            const names = { landscape: '风景', portrait: '人像', street: '街拍', detail: '细节' };
            
            tbody.innerHTML = photos.map(p => `
                <tr>
                    <td><img src="${p.thumb || p.src}" alt="${p.title}"></td>
                    <td>${p.title}</td>
                    <td><span class="category-tag">${names[p.category] || p.category}</span></td>
                    <td>${p.views || 0}</td>
                    <td class="actions">
                        <button class="btn btn-edit" onclick='editPhoto(${JSON.stringify(p)})'>编辑</button>
                        <button class="btn btn-danger" onclick="deletePhoto(${p.id})">删除</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="loading">暂无作品</td></tr>';
        }

        function openPhotoModal(id = null) {
            document.getElementById('photoModal').classList.add('active');
            document.getElementById('photoModalTitle').textContent = id ? '编辑作品' : '添加作品';
            document.getElementById('photoId').value = id || '';
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('active');
            document.getElementById('photoForm').reset();
        }

        function editPhoto(photo) {
            openPhotoModal(photo.id);
            document.getElementById('photoId').value = photo.id;
            document.getElementById('photoTitle').value = photo.title;
            document.getElementById('photoDesc').value = photo.description || '';
            document.getElementById('photoCategory').value = photo.category;
            document.getElementById('photoLocation').value = photo.location || '';
            document.getElementById('photoSrc').value = photo.src;
            document.getElementById('photoThumb').value = photo.thumb || '';
            document.getElementById('photoExif').value = photo.exif ? (typeof photo.exif === 'string' ? photo.exif : JSON.stringify(photo.exif)) : '';
            document.getElementById('photoThoughts').value = photo.thoughts || '';
        }

        async function deletePhoto(id) {
            if (!confirm('确定删除？')) return;
            
            await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            loadPhotos();
        }

        document.getElementById('photoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let exif = null;
            const exifStr = document.getElementById('photoExif').value;
            if (exifStr) {
                try { exif = JSON.parse(exifStr); } catch {}
            }
            
            const data = {
                title: document.getElementById('photoTitle').value,
                description: document.getElementById('photoDesc').value,
                category: document.getElementById('photoCategory').value,
                location: document.getElementById('photoLocation').value,
                src: document.getElementById('photoSrc').value,
                thumb: document.getElementById('photoThumb').value || document.getElementById('photoSrc').value,
                exif: exif,
                thoughts: document.getElementById('photoThoughts').value
            };
            
            const id = document.getElementById('photoId').value;
            const url = id ? `${SUPABASE_URL}/rest/v1/photos?id=eq.${id}` : `${SUPABASE_URL}/rest/v1/photos`;
            
            await fetch(url, {
                method: id ? 'PATCH' : 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(data)
            });
            
            closePhotoModal();
            loadPhotos();
        });

        // ===== 文章管理 =====
        async function loadArticles() {
            const tbody = document.getElementById('articlesTable');
            tbody.innerHTML = '<tr><td colspan="4" class="loading">加载中...</td></tr>';
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                const articles = await res.json();
                renderArticles(articles);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="error">加载失败</td></tr>`;
            }
        }

        function renderArticles(articles) {
            const tbody = document.getElementById('articlesTable');
            const names = { tutorial: '教程', thoughts: '随笔', gear: '器材' };
            
            tbody.innerHTML = articles.map(a => `
                <tr>
                    <td>${a.title}</td>
                    <td><span class="category-tag">${names[a.category] || a.category}</span></td>
                    <td>${a.views || 0}</td>
                    <td class="actions">
                        <button class="btn btn-edit" onclick='editArticle(${JSON.stringify(a)})'>编辑</button>
                        <button class="btn btn-danger" onclick="deleteArticle(${a.id})">删除</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="loading">暂无文章</td></tr>';
        }

        function openArticleModal(id = null) {
            document.getElementById('articleModal').classList.add('active');
            document.getElementById('articleModalTitle').textContent = id ? '编辑文章' : '添加文章';
            document.getElementById('articleId').value = id || '';
        }

        function closeArticleModal() {
            document.getElementById('articleModal').classList.remove('active');
            document.getElementById('articleForm').reset();
        }

        function editArticle(article) {
            openArticleModal(article.id);
            document.getElementById('articleId').value = article.id;
            document.getElementById('articleTitle').value = article.title;
            document.getElementById('articleExcerpt').value = article.excerpt || '';
            document.getElementById('articleCategory').value = article.category;
            document.getElementById('articleCover').value = article.cover_image || '';
            document.getElementById('articleContent').value = article.content;
        }

        async function deleteArticle(id) {
            if (!confirm('确定删除？')) return;
            
            await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            loadArticles();
        }

        document.getElementById('articleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('articleTitle').value,
                excerpt: document.getElementById('articleExcerpt').value,
                category: document.getElementById('articleCategory').value,
                cover_image: document.getElementById('articleCover').value,
                content: document.getElementById('articleContent').value
            };
            
            const id = document.getElementById('articleId').value;
            const url = id ? `${SUPABASE_URL}/rest/v1/articles?id=eq.${id}` : `${SUPABASE_URL}/rest/v1/articles`;
            
            await fetch(url, {
                method: id ? 'PATCH' : 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(data)
            });
            
            closeArticleModal();
            loadArticles();
        });

        checkAuth();
    </script>
</body>
</html>
